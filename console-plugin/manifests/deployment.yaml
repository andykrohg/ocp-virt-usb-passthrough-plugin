---
apiVersion: v1
kind: Namespace
metadata:
  name: usb-passthrough-plugin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: usb-passthrough-plugin
  namespace: usb-passthrough-plugin
  labels:
    app: usb-passthrough-plugin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: usb-passthrough-plugin
  template:
    metadata:
      labels:
        app: usb-passthrough-plugin
    spec:
      containers:
        - name: plugin
          image: quay.io/andy_krohg/usb-passthrough-plugin:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 9443
              protocol: TCP
          volumeMounts:
            - name: serving-cert
              mountPath: /var/serving-cert
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
            limits:
              cpu: 100m
              memory: 100Mi
      volumes:
        - name: serving-cert
          secret:
            secretName: usb-passthrough-plugin-cert
            defaultMode: 420
---
apiVersion: v1
kind: Service
metadata:
  name: usb-passthrough-plugin
  namespace: usb-passthrough-plugin
  labels:
    app: usb-passthrough-plugin
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: usb-passthrough-plugin-cert
spec:
  type: ClusterIP
  ports:
    - port: 9443
      targetPort: 9443
      protocol: TCP
      name: https
  selector:
    app: usb-passthrough-plugin
---
apiVersion: console.openshift.io/v1
kind: ConsolePlugin
metadata:
  name: usb-passthrough-plugin
spec:
  displayName: USB Passthrough
  backend:
    type: Service
    service:
      name: usb-passthrough-plugin
      namespace: usb-passthrough-plugin
      port: 9443
      basePath: /
