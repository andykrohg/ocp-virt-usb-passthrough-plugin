apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: usbconnections.usb.openshift.io
spec:
  group: usb.openshift.io
  names:
    kind: USBConnection
    listKind: USBConnectionList
    plural: usbconnections
    singular: usbconnection
    shortNames:
      - usbconn
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - workstationAddress
                - deviceID
                - vmName
                - namespace
              properties:
                workstationAddress:
                  type: string
                  description: "IP:port of the workstation running USB/IP server"
                deviceID:
                  type: string
                  description: "USB vendor:product ID (e.g., 090c:1000)"
                deviceName:
                  type: string
                  description: "Human-readable device name"
                vmName:
                  type: string
                  description: "Name of the VirtualMachineInstance"
                namespace:
                  type: string
                  description: "Namespace containing the VM"
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum:
                    - Pending
                    - Connecting
                    - Connected
                    - Disconnecting
                    - Failed
                  description: "Current connection phase"
                message:
                  type: string
                  description: "Human-readable status message"
                connectedAt:
                  type: string
                  format: date-time
                  description: "Timestamp when connection was established"
                lastError:
                  type: string
                  description: "Last error message if connection failed"
      additionalPrinterColumns:
        - name: Device
          type: string
          jsonPath: .spec.deviceID
        - name: VM
          type: string
          jsonPath: .spec.vmName
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}
