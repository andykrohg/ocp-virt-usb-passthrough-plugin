---
apiVersion: v1
kind: Namespace
metadata:
  name: usb-passthrough-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: usb-listener-operator
  namespace: usb-passthrough-system
  labels:
    app: usb-listener-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: usb-listener-operator
  template:
    metadata:
      labels:
        app: usb-listener-operator
    spec:
      serviceAccountName: usb-listener-operator
      containers:
        - name: manager
          image: quay.io/andy_krohg/usb-listener-operator:latest
          imagePullPolicy: IfNotPresent
          command:
            - /manager
          env:
            - name: WATCH_NAMESPACE
              value: ""  # Watch all namespaces
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
