---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: usb-listener-operator
  namespace: usb-passthrough-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: usb-listener-operator-role
rules:
  # USBDevice permissions
  - apiGroups:
      - usb.openshift.io
    resources:
      - usbdevices
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - usb.openshift.io
    resources:
      - usbdevices/status
    verbs:
      - get
      - update
      - patch
  # USBConnection permissions
  - apiGroups:
      - usb.openshift.io
    resources:
      - usbconnections
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - usb.openshift.io
    resources:
      - usbconnections/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - usb.openshift.io
    resources:
      - usbconnections/finalizers
    verbs:
      - update
  # VirtualMachineInstance permissions (read-only)
  - apiGroups:
      - kubevirt.io
    resources:
      - virtualmachineinstances
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: usb-listener-operator-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: usb-listener-operator-role
subjects:
  - kind: ServiceAccount
    name: usb-listener-operator
    namespace: usb-passthrough-system
